version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    command: python app.py
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    ports:
      - "8080:8080"
    depends_on:
      - mongodb

volumes:
  mongo-data:
